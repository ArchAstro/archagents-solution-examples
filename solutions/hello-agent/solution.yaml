  # Hello Agent

  The smallest valid ArchAstro Solution: one agent, builtin tools, no custom
  scripts or tools. Use it as the skeleton for a new solution, then add
  tools, routines, skills, and scripts as you need them — see the
  `osv-vuln-checker` example for the full set.

